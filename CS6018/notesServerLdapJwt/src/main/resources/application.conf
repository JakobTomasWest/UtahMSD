ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = [ com.codersee.ApplicationKt.module ]
  }
}

jwt {
  # sensible dev defaults
  secret   = "dev-super-secret"
  issuer   = "http://localhost/"
  audience = "my-audience"
  realm    = "My realm"

  # allow environment overrides (optional; used by Docker/CI)
  secret   = ${?SECRET}
  issuer   = ${?ISSUER}
  audience = ${?AUDIENCE}
  realm    = ${?REALM}
}

#
ldap {
  url      = "ldap://localhost:389"
  baseDn   = "dc=example,dc=org"
  bindDn   = ${?LDAP_BIND_DN}
  bindPw   = ${?LDAP_BIND_PW}

  # allow Compose to point at the LDAP container
  url      = ${?LDAP_URL}
  baseDn   = ${?LDAP_BASE_DN}
}

upload {
  # default local path; Compose will set UPLOAD_ROOT=/app/uploads
  root = "uploads"
  root = ${?UPLOAD_ROOT}
}